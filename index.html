<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="styles.css" />
    <title>Kids Spotify Player</title>
  </head>
  <body>
    <div id="app">
      <div id="leftPanel" aria-label="Favorites panel">
        <div id="tileGrid" role="listbox" aria-label="Favorite items"></div>
        <div id="leftPanelNav">
          <button id="navPrev" class="navButton" aria-label="Previous tile">
            <span class="icon icon-arrow-back" aria-hidden="true"></span>
          </button>
          <button id="navNext" class="navButton" aria-label="Next tile">
            <span class="icon icon-arrow-forward" aria-hidden="true"></span>
          </button>
        </div>
      </div>

      <div id="rightPanel" aria-label="Now playing panel">
        <div id="connectionRow">
          <span id="connectionIcon" class="icon icon-connecting" aria-hidden="true"></span>
          <span id="connectionText">Connecting to Spotify...</span>
        </div>

        <img id="albumArt" alt="Current album art" width="180" height="180" decoding="async" />

        <div id="controls" aria-label="Playback controls">
          <button id="btnPrev" class="controlButton" aria-label="Previous song">
            <span class="icon icon-skip-previous" aria-hidden="true"></span>
          </button>
          <button id="btnPlayPause" class="controlButton" aria-label="Play pause">
            <span id="playPauseIcon" class="icon icon-play-circle" aria-hidden="true"></span>
          </button>
          <button id="btnNext" class="controlButton" aria-label="Next song">
            <span class="icon icon-skip-next" aria-hidden="true"></span>
          </button>
        </div>

        <ul id="trackList" aria-label="Current playlist"></ul>
      </div>
    </div>

    <script src="https://sdk.scdn.co/spotify-player.js"></script>
    <script src="app.js"></script>
  </body>
</html>
