<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta
      name="description"
      content="Fullscreen Spotify player for kids with favorites-only playback and large controls."
    />
    <meta name="theme-color" content="#000000" />
    <link rel="icon" href="/assets/icons/app.svg" type="image/svg+xml" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="stylesheet" href="/styles.css" />
    <title>Kids Spotify Player</title>
  </head>
  <body>
    <div id="app">
      <div id="tilePanel" aria-label="Favorites panel">
        <div id="tileGrid" role="listbox" aria-label="Favorite items"></div>
      </div>

      <div id="playerPanel" aria-label="Now playing panel">
        <div id="previousTrack" hidden aria-label="Previous song">
          <img id="previousTrackImage" alt="" width="48" height="48" decoding="async" />
          <div id="previousTrackText"></div>
        </div>
        <div id="nowPlayingHeader">
          <img id="albumArt" alt="Current album art" width="160" height="160" decoding="async" />

          <div id="playerMeta">
            <div id="trackMeta" aria-live="polite">
              <div id="trackArtist">—</div>
              <div id="trackTitle">Nothing playing</div>
            </div>
            <div id="progressRow">
              <div id="progressBar" role="progressbar" aria-label="Song progress" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
                <div id="progressFill"></div>
              </div>
              <button id="btnRestart" class="controlButton compactControlButton" aria-label="Restart song">↺</button>
            </div>
            <div id="controls" aria-label="Playback controls">
          <button id="btnPrev" class="controlButton" aria-label="Previous song">
            <span class="icon icon-skip-previous" aria-hidden="true"></span>
          </button>
          <button id="btnPlayPause" class="controlButton" aria-label="Play pause">
            <span id="playPauseIcon" class="icon icon-play-circle" aria-hidden="true"></span>
          </button>
          <button id="btnNext" class="controlButton" aria-label="Next song">
            <span class="icon icon-skip-next" aria-hidden="true"></span>
          </button>
            </div>
          </div>
        </div>

        <ul id="trackList" aria-label="Current playlist"></ul>
      </div>
    </div>

    <div id="connectionStatus" aria-live="polite" aria-atomic="true">
      <span id="connectionStatusIcon" class="icon connectionStatusIcon icon-connected" aria-hidden="true"></span>
      <span id="connectionStatusText"></span>
    </div>

    <script src="https://sdk.scdn.co/spotify-player.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
