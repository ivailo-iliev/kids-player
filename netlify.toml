[build]
  publish = "."

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://sdk.scdn.co; connect-src 'self' https://sdk.scdn.co https://api.spotify.com https://accounts.spotify.com https://apresolve.spotify.com https://spclient.wg.spotify.com https://*.spotify.com https://*.scdn.co https://*.spotifycdn.com wss://*.spotify.com; img-src 'self' data: blob: https://*.scdn.co https://*.spotifycdn.com; style-src 'self'; font-src 'self'; media-src blob: https://*.scdn.co https://*.spotifycdn.com https://*.spotify.com; worker-src 'self' blob:; frame-src https://sdk.scdn.co https://*.spotify.com; form-action 'self' https://accounts.spotify.com; base-uri 'self'; frame-ancestors 'none'; manifest-src 'self'"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/app.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/styles.css"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Content-Type = "application/manifest+json; charset=utf-8"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/assets/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, must-revalidate"
